<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SprintLens{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='vendor/htmx.min.js') }}"></script>
</head>
<body class="bg-base-200 min-h-screen">
    <!-- Navbar -->
    <div class="navbar bg-base-100 border-b border-base-300 px-6">
        <div class="flex-1 gap-6">
            <span class="text-xl font-bold tracking-tight">SprintLens</span>
            <!-- Top Menu -->
            <nav id="top-menu" class="flex gap-1">
                {% for item in menu_items %}
                <button
                    class="btn btn-ghost btn-sm{% if item.id == active_menu %} btn-active{% endif %}"
                    hx-get="{{ item.partial_url }}"
                    hx-target="#main-content"
                    hx-indicator="#loading-indicator"
                    hx-push-url="{{ item.url }}"
                    hx-on::after-request="
                        document.querySelectorAll('#top-menu button').forEach(b => b.classList.remove('btn-active'));
                        this.classList.add('btn-active');
                    "
                >{{ item.label }}</button>
                {% endfor %}
            </nav>
        </div>
        <div class="flex-none gap-2">
            <button
                class="btn btn-ghost btn-sm"
                hx-get="{{ current_partial_url|default('/partials/dashboard') }}"
                hx-target="#main-content"
                hx-indicator="#loading-indicator"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                새로고침
            </button>
        </div>
    </div>

    <!-- Loading Indicator -->
    <div id="loading-indicator" class="htmx-indicator w-full">
        <progress class="progress progress-primary w-full"></progress>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
