<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SprintLens{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='vendor/htmx.min.js') }}"></script>
</head>
<body class="bg-base-200 h-screen flex flex-col overflow-hidden">

    <!-- Navbar (상단 고정, 64px) -->
    <div class="navbar bg-base-100 border-b border-base-300 px-6 h-16 min-h-16 shrink-0">
        <div class="flex-1 gap-6">
            <!-- 로고 (홈으로 이동) -->
            <a
                href="/"
                class="text-xl font-bold tracking-tight hover:opacity-80 transition-opacity"
                hx-get="/partials/home"
                hx-target="#main-content"
                hx-push-url="/"
                hx-on::after-request="
                    document.querySelectorAll('#top-menu button').forEach(b => b.classList.remove('btn-active'));
                "
            >SprintLens</a>
            <!-- Top Menu -->
            <nav id="top-menu" class="flex gap-1">
                {% for item in menu_items %}
                <button
                    class="btn btn-ghost btn-sm{% if item.id == active_menu %} btn-active{% endif %}"
                    hx-get="{{ item.partial_url }}"
                    hx-target="#main-content"
                    hx-indicator="#loading-indicator"
                    hx-push-url="{{ item.url }}"
                    hx-on::after-request="
                        document.querySelectorAll('#top-menu button').forEach(b => b.classList.remove('btn-active'));
                        this.classList.add('btn-active');
                    "
                >{{ item.label }}</button>
                {% endfor %}
            </nav>
        </div>
        <div class="flex-none gap-2">
            <!-- Loading Indicator (인라인) -->
            <span id="loading-indicator" class="htmx-indicator loading loading-spinner loading-sm"></span>
        </div>
    </div>

    <!-- Body: Sidebar + Main -->
    <div class="flex flex-1 overflow-hidden">

        <!-- Sidebar (좌측 고정, 240px) -->
        <aside class="hidden lg:flex flex-col w-60 shrink-0 bg-base-100 border-r border-base-300 overflow-y-auto">
            <div id="sidebar-content" class="p-4">
                {% block sidebar %}{% endblock %}
            </div>
        </aside>

        <!-- Main Content (스크롤 가능) -->
        <div class="flex-1 overflow-y-auto p-6">
            {% block content %}{% endblock %}
        </div>

    </div>

</body>
</html>
